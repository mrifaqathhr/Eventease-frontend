<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EventEase Admin Portal Login</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e8305e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211115",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Noto Sans", "sans-serif"] // Added sans for UI elements as requested in description
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-sans text-slate-900 dark:text-slate-100 antialiased overflow-hidden relative">
<!-- Background Pattern/Gradient for subtle texture -->
<div class="absolute inset-0 z-0 opacity-40 pointer-events-none" style="background-image: radial-gradient(#e8305e 0.5px, transparent 0.5px); background-size: 24px 24px;"></div>
<div class="absolute inset-0 z-0 bg-gradient-to-b from-transparent to-background-light/90 dark:to-background-dark/90 pointer-events-none"></div>
<!-- Main Auth Card -->
<div class="relative z-10 w-full max-w-md p-6 sm:p-8">
<div class="bg-white dark:bg-[#2a1a1e] rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
<!-- Header Section -->
<div class="px-8 pt-10 pb-6 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary/10 mb-4 text-primary">
<span class="material-symbols-outlined text-2xl">security</span>
</div>
<h1 class="font-display text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-2">EventEase</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium uppercase tracking-wider">Admin Portal</p>
<p class="text-slate-400 dark:text-slate-500 text-xs mt-1">Authorized personnel only</p>
</div>
<!-- Login Form -->
<form class="px-8 pb-8 space-y-5" onsubmit="event.preventDefault();">
<!-- Email Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="email">Admin Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all sm:text-sm" id="email" name="email" placeholder="admin@eventease.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-slate-200 dark:border-slate-600 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all sm:text-sm" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer group">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary/50 cursor-pointer" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-900 dark:group-hover:text-slate-200 transition-colors">Remember this device</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                    Login to Admin Panel
                </button>
<!-- Footer Links -->
<div class="flex flex-col items-center space-y-3 pt-2">
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
<a class="text-xs text-slate-500 hover:text-slate-700 dark:text-slate-400 dark:hover:text-slate-300 transition-colors flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">support_agent</span>
                        Contact Super Admin
                    </a>
</div>
</form>
<!-- Security Notice -->
<div class="bg-slate-50 dark:bg-slate-800/50 px-8 py-4 border-t border-slate-100 dark:border-slate-700">
<div class="flex items-start gap-3">
<span class="material-symbols-outlined text-slate-400 text-lg mt-0.5">lock_clock</span>
<p class="text-xs text-slate-500 dark:text-slate-400 leading-relaxed">
                        This system is for the use of authorized users only. Activities on this system may be monitored and recorded.
                    </p>
</div>
</div>
</div>
<!-- Bottom Branding -->
<div class="mt-8 text-center">
<p class="text-xs text-slate-400 dark:text-slate-500 font-display">© 2024 EventEase Inc. Secure Server.</p>
</div>
</div>
</body></html>
