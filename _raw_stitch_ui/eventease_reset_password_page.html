</div>
<h2 class="text-text-main dark:text-white text-xl font-bold font-display leading-tight tracking-[-0.015em]">EventEase</h2>
</div>
<div class="flex flex-1 justify-end gap-8">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-6 bg-transparent text-primary hover:bg-primary/5 transition-colors text-sm font-bold leading-normal tracking-[0.015em] border border-transparent">
<span class="truncate">Help</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-6 bg-primary hover:bg-primary/90 transition-colors text-white text-sm font-bold leading-normal tracking-[0.015em] shadow-sm">
<span class="truncate">Log In</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4 sm:p-8">
<div class="w-full max-w-[520px] bg-neutral-surface dark:bg-[#2a171d] rounded-lg shadow-xl border border-neutral-border dark:border-white/5 overflow-hidden">
<div class="p-8 sm:p-10 flex flex-col gap-6">
<!-- Heading Section -->
<div class="text-center flex flex-col gap-2">
<div class="size-12 rounded-full bg-primary/10 flex items-center justify-center mx-auto mb-2 text-primary">
<span class="material-symbols-outlined text-2xl">lock_reset</span>
</div>
<h1 class="text-text-main dark:text-white text-3xl sm:text-4xl font-display font-medium tracking-tight">Set a New Password</h1>
<p class="text-text-secondary dark:text-neutral-400 text-base font-normal">
                            Your new password must be different from previously used passwords.
                        </p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6 mt-2">
<!-- New Password Field -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-neutral-200 text-sm font-semibold leading-normal font-body" for="new-password">New Password</label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg bg-white dark:bg-white/5 border border-neutral-200 dark:border-white/10 text-text-main dark:text-white placeholder:text-text-secondary/50 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body" id="new-password" placeholder="Enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
<!-- Strength Meter -->
<div class="flex flex-col gap-2 mt-1">
<div class="flex justify-between items-center text-xs">
<span class="text-text-secondary dark:text-neutral-400 font-medium">Strength</span>
<span class="text-primary font-semibold">Medium</span>
</div>
<div class="flex gap-1 h-1.5 w-full">
<div class="h-full w-1/4 rounded-full bg-primary"></div>
<div class="h-full w-1/4 rounded-full bg-primary"></div>
<div class="h-full w-1/4 rounded-full bg-neutral-200 dark:bg-white/10"></div>
<div class="h-full w-1/4 rounded-full bg-neutral-200 dark:bg-white/10"></div>
</div>
<p class="text-text-secondary dark:text-neutral-500 text-xs flex items-center gap-1 mt-1">
<span class="material-symbols-outlined text-sm">info</span>
                                    At least 8 characters required
                                </p>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="text-text-main dark:text-neutral-200 text-sm font-semibold leading-normal font-body" for="confirm-password">Confirm Password</label>
<div class="relative group">
<input class="w-full h-12 px-4 rounded-lg bg-white dark:bg-white/5 border border-neutral-200 dark:border-white/10 text-text-main dark:text-white placeholder:text-text-secondary/50 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body" id="confirm-password" placeholder="Re-enter new password" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility_off</span>
</button>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-12 mt-4 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all transform active:scale-[0.99] flex items-center justify-center gap-2">
<span>Update Password</span>
<span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Back Link -->
<div class="text-center mt-2">
<a class="text-text-secondary dark:text-neutral-400 hover:text-primary dark:hover:text-primary text-sm font-medium flex items-center justify-center gap-1 transition-colors" href="#">
<span class="material-symbols-outlined text-base">arrow_back</span>
                            Back to Log In
                        </a>
</div>
</div>
<!-- Decorative Footer of Card -->
<div class="bg-neutral-50 dark:bg-white/5 px-8 py-4 border-t border-neutral-100 dark:border-white/5 flex items-center justify-center gap-6">
<span class="text-xs text-text-secondary dark:text-neutral-500 font-medium">Trusted by leading event planners</span>
<div class="flex -space-x-2">
<!-- Using abstract avatars as placeholders -->
<div class="w-6 h-6 rounded-full border-2 border-white dark:border-[#2a171d] bg-gradient-to-br from-pink-300 to-rose-300" data-alt="Abstract user avatar gradient pink"></div>
<div class="w-6 h-6 rounded-full border-2 border-white dark:border-[#2a171d] bg-gradient-to-br from-purple-300 to-indigo-300" data-alt="Abstract user avatar gradient purple"></div>
<div class="w-6 h-6 rounded-full border-2 border-white dark:border-[#2a171d] bg-gradient-to-br from-amber-300 to-orange-300" data-alt="Abstract user avatar gradient orange"></div>
<div class="w-6 h-6 rounded-full border-2 border-white dark:border-[#2a171d] bg-neutral-200 dark:bg-white/20 flex items-center justify-center text-[8px] font-bold text-text-secondary">+2k</div>
</div>
</div>
</div>
</main>
<!-- Simple Footer -->
<footer class="py-6 text-center text-text-secondary dark:text-neutral-500 text-sm">
<p>© 2024 EventEase. All rights reserved.</p>
</footer>
</div>
