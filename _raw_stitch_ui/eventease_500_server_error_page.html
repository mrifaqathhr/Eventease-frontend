<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EventEase 500 Server Error Page</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600;700&amp;family=Noto+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e8305e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211115",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
</head>
<body class="font-sans bg-background-light dark:bg-background-dark min-h-screen flex flex-col text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Header -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-slate-200 dark:border-slate-800 px-6 lg:px-10 py-4 bg-white dark:bg-[#2a171c]">
<div class="flex items-center gap-4">
<div class="size-8 text-primary">
<span class="material-symbols-outlined text-3xl">diversity_3</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold font-display leading-tight tracking-[-0.015em]">EventEase</h2>
</div>
<div class="flex items-center gap-4 lg:gap-8">
<div class="hidden md:flex items-center gap-6 lg:gap-9">
<a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Home</a>
<a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Vendors</a>
<a class="text-slate-700 dark:text-slate-300 text-sm font-medium hover:text-primary transition-colors" href="#">Help</a>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-xl h-10 px-6 bg-primary hover:bg-rose-600 transition-colors text-white text-sm font-bold leading-normal tracking-[0.015em]">
<span class="truncate">Sign In</span>
</button>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 flex items-center justify-center p-4 py-12 md:py-20 bg-background-light dark:bg-background-dark">
<div class="w-full max-w-[520px] bg-white dark:bg-[#2a171c] rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 p-8 md:p-12 flex flex-col items-center text-center">
<!-- Icon -->
<div class="mb-8 flex items-center justify-center">
<div class="flex h-20 w-20 items-center justify-center rounded-full bg-rose-50 dark:bg-rose-900/20">
<span aria-hidden="true" class="material-symbols-outlined text-4xl text-primary dark:text-rose-400">dns</span>
</div>
</div>
<!-- Heading -->
<h1 class="mb-4 text-3xl md:text-4xl font-bold font-display text-slate-900 dark:text-white">
                    Something Went Wrong
                </h1>
<!-- Subtext -->
<p class="mb-10 text-base md:text-lg text-slate-600 dark:text-slate-400 font-normal leading-relaxed max-w-sm mx-auto">
                    We’re experiencing a temporary issue on our end. Our team has been notified and is working to resolve it.
                </p>
<!-- Actions -->
<div class="flex flex-col gap-3 w-full max-w-[320px]">
<button class="w-full cursor-pointer items-center justify-center rounded-xl h-12 px-6 bg-primary hover:bg-rose-600 transition-colors text-white text-base font-bold tracking-[0.015em] shadow-sm hover:shadow-md">
                        Try Again
                    </button>
<button class="w-full cursor-pointer items-center justify-center rounded-xl h-12 px-6 bg-slate-50 dark:bg-slate-800 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 text-base font-medium tracking-[0.015em]">
                        Return to Homepage
                    </button>
</div>
<!-- Support Link -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 w-full">
<p class="text-sm text-slate-500 dark:text-slate-400">
                        Need immediate assistance? 
                        <a class="text-primary font-medium hover:underline decoration-primary/50 underline-offset-2 ml-1" href="#">Contact Support</a>
</p>
</div>
</div>
</main>
<!-- Footer -->
<footer class="border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-[#2a171c] py-8">
<div class="container mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-6">
<div class="flex flex-wrap items-center justify-center gap-6 md:justify-start">
<a class="text-slate-500 dark:text-slate-400 text-sm hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="text-slate-500 dark:text-slate-400 text-sm hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="text-slate-500 dark:text-slate-400 text-sm hover:text-primary transition-colors" href="#">Cookie Policy</a>
</div>
<p class="text-slate-400 dark:text-slate-500 text-sm">© 2024 EventEase Inc.</p>
</div>
</footer>
</div>
</body></html>
