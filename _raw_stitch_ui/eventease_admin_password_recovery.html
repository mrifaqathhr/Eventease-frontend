<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>EventEase Admin Password Recovery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600;700&amp;family=Noto+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e8305e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211115",
                    },
                    fontFamily: {
                        "display": ["Newsreader", "serif"],
                        "sans": ["Noto Sans", "sans-serif"],
                    },
                    borderRadius: { "DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px" },
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-sans text-slate-900 dark:text-slate-100 min-h-screen flex flex-col items-center justify-center p-4">
<!-- Main Authentication Card -->
<div class="w-full max-w-[480px] bg-white dark:bg-[#2a171c] rounded-xl shadow-lg border border-slate-200 dark:border-[#3d242a] overflow-hidden">
<!-- Header Section -->
<div class="px-8 pt-10 pb-6 text-center">
<div class="flex items-center justify-center gap-2 mb-6 text-primary">
<span class="material-symbols-outlined text-3xl">diversity_1</span>
<span class="font-display font-bold text-2xl tracking-tight text-slate-900 dark:text-white">EventEase</span>
</div>
<h1 class="font-display text-3xl font-bold tracking-tight mb-3 text-slate-900 dark:text-white">Admin Password Recovery</h1>
<p class="text-slate-500 dark:text-slate-400 text-base leading-relaxed">
                Enter your registered admin email to receive a reset link.
            </p>
</div>
<!-- Form Section -->
<div class="px-8 pb-8">
<form action="#" method="POST" onsubmit="event.preventDefault();">
<div class="mb-6">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">
                        Admin Email Address
                    </label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
<span class="material-symbols-outlined text-xl">mail</span>
</div>
<input class="block w-full rounded-lg border-slate-200 dark:border-[#523139] bg-slate-50 dark:bg-[#361e24] pl-10 pr-4 py-3 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-primary focus:ring-1 transition-colors" id="email" name="email" placeholder="admin@eventease.com" required="" type="email"/>
</div>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary dark:focus:ring-offset-[#2a171c]" type="submit">
<span class="truncate">Send Reset Link</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</form>
<div class="mt-6 text-center">
<a class="inline-flex items-center gap-1 text-sm font-medium text-slate-500 hover:text-primary transition-colors dark:text-slate-400 dark:hover:text-primary" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                    Back to Admin Login
                </a>
</div>
</div>
<!-- Security Footer -->
<div class="bg-slate-50 dark:bg-[#361e24] px-8 py-4 border-t border-slate-100 dark:border-[#3d242a] text-center">
<div class="flex items-center justify-center gap-2 text-xs text-slate-500 dark:text-slate-400">
<span class="material-symbols-outlined text-sm">lock</span>
<span>Secure SSL encrypted connection</span>
</div>
</div>
</div>
<!-- Background Decoration (Subtle) -->
<div class="fixed inset-0 -z-10 h-full w-full bg-background-light dark:bg-background-dark bg-[radial-gradient(#e5e7eb_1px,transparent_1px)] [background-size:16px_16px] [mask-image:radial-gradient(ellipse_50%_50%_at_50%_50%,#000_70%,transparent_100%)] dark:bg-[radial-gradient(#3d242a_1px,transparent_1px)] opacity-50"></div>
</body></html>
